schema_version: "0.1"
status: selected_from_real_sweep
codec:
  base: webp
  patches: webp
  masks: png_lossless
  archive_compression: stored
  quality_sweep: [70, 75, 80, 90, 95]
  independent_quality_range:
    min: 1
    max: 100
    step: 1
alignment:
  primary_model: partial_affine
  fallback_model: homography
  detector: orb
  estimator: ransac
  min_inlier_ratio: 0.80
  reprojection_error_units: analysis_pixels
  analysis_max_dimension: 800
  max_median_reprojection_error_analysis_pixels: 2.0
change_mask:
  pixel_threshold_sweep: [8, 12, 16, 24]
  dilation_radius_sweep: [2, 4, 8]
  feather_radius_sweep: [0, 2, 4]
  minimum_component_area_sweep: [256, 512, 768, 1024, 1152]
quality:
  metric: ssim_rgb
  data_range: 255
  channel_axis: 2
  min_per_frame: 0.82
  min_mean: 0.85
measurement:
  source: exact_uploaded_files
  package: closed_photofold_archive
  independent_control: matched_quality_webp_rate_distortion
selected:
  base_quality: 70
  patch_quality: 70
  pixel_threshold: 24
  dilation_radius: 8
  feather_radius: 2
  minimum_component_area: 1152
  tile_size: 384
  patch_margin: 2
  maximum_patches_per_frame: 64
notes:
  - Selected after the 2026-07-18 real HDR+ sweep; compact machine-only JSON, dilation 8, decoder-side feathering, and a 1152-pixel minimum component area removed archive and fragmented-noise overhead without changing the transform model.
  - Patch crops retain real pixels outside the binary mask so lossy WebP cannot bleed zero-fill into the composited edge; the mask alone determines which pixels are applied.
  - The independent control exhaustively tests every integer WebP quality from 1 through 100 and selects the smallest point with equal-or-better mean and minimum SSIM.
  - Visual review confirmed that the minimum-SSIM frame retains the complete scene without an obvious seam at normal size or full-resolution inspection; fine foliage and burst noise dominate the heatmap differences.
  - These thresholds apply only to hdrplus-static and are not general product guarantees.
  - Alignment reprojection error is measured in analysis-space pixels on a copy whose longest dimension is at most 800 pixels; it is never scaled back to resolution-dependent source pixels.
